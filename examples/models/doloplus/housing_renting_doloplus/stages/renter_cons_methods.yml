stage: RenterConsumptionChoice

methods:
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !egm

      - scheme: interpolation
        method: !Cartesian
        settings:
          orders: [n_w_rent]
          bounds: [[w_rent_min, w_rent_max]]

      - scheme: upper_envelope
        method: !FUES
        settings:
          m_bar: m_bar_rent
