name: TenureChoice
kind: branching
branch_control: agent

symbols:
  spaces:
    Xa: "@def R+"
    XH: "@def linspace(H_min, H_max, n_H)"
    XY: "@def {0, ..., n_y - 1}"

  prestate:
    a: "@in Xa"
    H: "@in XH"
    y_pre: "@in XY"

  exogenous:
    y:
      - "@in XY"
      - "@dist DiscreteMarkov(Pi, z_vals)"

  states:
    a: "@in Xa"
    H: "@in XH"
    y: "@in XY"

  poststates:
    own:
      a_o: "@in Xa"
      H_o: "@in XH"
      y_o: "@in XY"
    rent:
      w_r: "@in Xa"
      y_r: "@in XY"

  controls:
    d: "@in {own, rent}"

  values:
    V[<]: "@in [-inf, inf)"
    V: "@in [-inf, inf)"
    V_cntn:
      own: "@in [-inf, inf)"
      rent: "@in [-inf, inf)"

  parameters: [r, n_H, H_min, H_max, n_y, Pi, z_vals]

equations:
  arvl_to_dcsn_transition: |
    a = a[<]
    H = H[<]

  dcsn_to_cntn_transition:
    own: |
      a_o[>] = a
      H_o[>] = H
      y_o[>] = y
    rent: |
      w_r[>] = (1 + r) * a + z_vals[y] + H
      y_r[>] = y

  cntn_to_dcsn_mover:
    Bellman: |
      V = max_d{V_cntn[>][own], V_cntn[>][rent]}

  dcsn_to_arvl_mover:
    Bellman: |
      V[<] = E_{y|y_pre}(V)
