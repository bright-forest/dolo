name: OwnerHousingChoice

symbols:
  spaces:
    Xa: "@def R+"
    XH: "@def linspace(H_min, H_max, n_H)"
    XY: "@def {0, ..., n_y - 1}"

  prestate:
    a_o: "@in Xa"
    H_o: "@in XH"
    y_o: "@in XY"

  states:
    a_o: "@in Xa"
    H_o: "@in XH"
    y_o: "@in XY"

  poststates:
    w_oc: "@in Xa"
    H_nxt: "@in XH"
    y_o: "@in XY"

  controls:
    H_choice: "@in XH"

  exogenous: {}

  values:
    V[>]: "@in [-inf, inf)"
    V[<]: "@in [-inf, inf)"
    V: "@in [-inf, inf)"

  parameters: [r, phi, n_H, H_min, H_max, n_y, z_vals]

equations:
  arvl_to_dcsn_transition: |
    a_o = a_o[<]
    H_o = H_o[<]
    y_o = y_o[<]

  dcsn_to_cntn_transition: |
    w_oc[>] = (1 + r) * a_o + z_vals[y_o] + H_o - (1 + phi * (H_choice != H_o)) * H_choice
    H_nxt[>] = H_choice
    y_o[>] = y_o

  cntn_to_dcsn_builder:
    Bellman: |
      V = max_{H_choice}(V[>])

  dcsn_to_arvl_builder:
    Bellman: |
      V[<] = V
