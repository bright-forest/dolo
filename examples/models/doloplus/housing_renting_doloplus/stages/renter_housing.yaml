name: RenterHousingChoice

symbols:
  spaces:
    Xa: "@def R+"
    XS: "@def linspace(S_min, S_max, n_S)"
    XY: "@def {0, ..., n_y - 1}"

  prestate:
    w_r: "@in Xa"
    y_r: "@in XY"

  states:
    w_r: "@in Xa"
    y_r: "@in XY"

  poststates:
    w_rc: "@in Xa"
    S: "@in XS"
    y_r: "@in XY"

  controls:
    S_choice: "@in XS"

  exogenous: {}

  values:
    V[>]: "@in [-inf, inf)"
    V[<]: "@in [-inf, inf)"
    V: "@in [-inf, inf)"

  parameters: [P_r, n_S, S_min, S_max]

equations:
  arvl_to_dcsn_transition: |
    w_r = w_r[<]
    y_r = y_r[<]

  dcsn_to_cntn_transition: |
    w_rc[>] = w_r - P_r * S_choice
    S[>] = S_choice
    y_r[>] = y_r

  cntn_to_dcsn_builder:
    Bellman: |
      V = max_{S_choice}(V[>])

  dcsn_to_arvl_builder:
    Bellman: |
      V[<] = V
