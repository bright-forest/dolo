name: RenterConsumptionChoice

symbols:
  spaces:
    Xa: "@def R+"
    XS: "@def linspace(S_min, S_max, n_S)"
    XH: "@def linspace(H_min, H_max, n_H)"
    XY: "@def {0, ..., n_y - 1}"

  prestate:
    w_rc: "@in Xa"
    S: "@in XS"
    y_r: "@in XY"

  states:
    w_rc: "@in Xa"
    S: "@in XS"
    y_r: "@in XY"

  poststates:
    b_r: "@in Xa"
    H_r: "@in XH"
    y_r: "@in XY"

  controls:
    c: "@in R+"

  exogenous: {}

  values:
    V[>]: "@in [-inf, inf)"
    V[<]: "@in [-inf, inf)"
    V: "@in [-inf, inf)"

  values_marginal:
    dV[>]: "@in R+"
    dV: "@in R+"

  parameters: [beta, gamma, rho, theta, kappa, iota, n_S, S_min, S_max, n_H, H_min, H_max]

equations:
  arvl_to_dcsn_transition: |
    w_rc = w_rc[<]
    S = S[<]
    y_r = y_r[<]

  dcsn_to_cntn_transition: |
    b_r[>] = w_rc - c
    H_r[>] = 0
    y_r[>] = y_r

  cntn_to_dcsn_builder:
    Bellman: |
      V = max_c{u(c, S) + beta * V[>]}
    InvEuler: |
      c = u_c_inv(beta * dV[>], S)
    MarginalBellman: |
      dV = u_c(c, S)

  dcsn_to_arvl_builder:
    Bellman: |
      V[<] = V
