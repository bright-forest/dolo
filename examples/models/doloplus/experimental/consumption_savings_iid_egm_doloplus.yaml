symbols:
  # Dolo+ vs Dolo (dtcc/EGM horse):
  # - NEW in Dolo+: `prestate`, `values`, `shadow_value` (explicit stage/perch objects)
  # - DROPPED in Dolo+: `expectations: [mr]` (Dolo computes this algorithmically; translator may re-introduce it in the horse YAML)
  prestate: [b]               # NEW (arrival/ante state; corresponds to Dolo `a[t-1]` / `poststates[-1]`)
  exogenous: [y]              # same as Dolo exogenous shock (written as `y[t]` in horse equations)
  states: [w]                 # same role as Dolo state
  poststates: [a]             # same role as Dolo poststate (horse uses both `a[t]` and `a[t-1]`)
  controls: [c]               # same role as Dolo control
  # expectations: [mr]       # DROPPED in Dolo+ source (present in the Dolo horse)
  values: [V]                 # NEW (perch value objects, e.g. V[<], V, V[>]; implicit in Dolo EGM)
  shadow_value: [dV]          # NEW (perch shadow values; Dolo’s `mr` corresponds to discounted expected marginal value objects)
  parameters: [β, γ, σ, ρ, r]

equations:
  # v0.1 structural rule: each entry is either a string payload (`| ...`) or a single-level
  # mapping `{subeq_label: | ...}`; deeper nesting is disallowed in `dialect: adc-stage`.
  arvl_to_dcsn_transition: |  # Dolo: half_transition.
    w = exp(y) + b[<]*r

  dcsn_to_cntn_transition: |  # Dolo: auxiliary_direct_egm
    a[>] = w - c

  cntn_to_dcsn_transition: |  # Dolo: reverse_state
    w = a[>] + c

  cntn_to_dcsn_builder:         # Dolo: direct_response_egm (+ expectation integrand)
    Bellman: |                # Dolo: (implicit; value recursion not explicit in horse YAML)
      V = max_{c}((c^(1-γ))/(1-γ) + β*V[>])
    InvEuler: |               # Dolo: direct_response_egm (policy update from expected marginal value)
      c[>] = (β*dV[>])^(-1/γ)
    ShadowBellman: |           # Dolo: expectation integrand (RHS)
      dV = (c)^(-γ)

  dcsn_to_arvl_builder:         # Dolo: expectation (produces mr)
    Bellman: |                # Dolo: (implicit; value expectation not explicit in horse YAML)
      V[<] = E_{y}(V)
    ShadowBellman: |          # Dolo: expectation output (LHS mr)
      dV[<] = r * E_{y}(dV)
