# Consumption stage (B2): EGM-style, with income shock y only.
#
# Key feature of B2: the portfolio stage already applied the RoR shock and produced `b`,
# so this stage does not need a return shock—only income `y`.

symbols:
  spaces:
    Xb: "@def R+"     # bank balance entering the stage
    Xw: "@def R+"     # decision resources
    Xa: "@def R+"     # end-of-stage assets (savings)
    Y:  "@def R"      # log-income shock support

  prestate:
    b: "@in Xb"

  exogenous:
    y:
      - "@in Y"
      - "@dist Normal(μ_y, σ_y)"

  states:
    w: "@in Xw"

  poststates:
    a: "@in Xa"

  controls:
    c: "@in R+"

  values:
    V: "@in R"

  shadow_value:
    dV: "@in R+"

  parameters:
    β: "@in (0,1)"
    γ: "@in R+"
    μ_y: "@in R"
    σ_y: "@in R+"

  settings:
    n_w: "@in Z+"
    n_y_nodes: "@in Z+"
    w_domain_min: "@in R+"
    w_domain_max: "@in R+"
    w_grid_min: "@in R+"
    w_grid_max: "@in R+"

equations:
  arvl_to_dcsn_transition: |
    w = exp(y) + b  # same as g = exp(y) + b[<], but we don't need it because

  dcsn_to_cntn_transition: |
    a = w - c
  
  cntn_to_dcsn_transition: |
    w_fn[>] = a + c[>]

  

  cntn_to_dcsn_mover:
    Bellman: |
      V = max_{c}((c^(1-γ))/(1-γ) + β*V[>])  # c here is an argument
    InvEuler: |
      c_consumed = (β*dV[>])^(-1/γ)
    ShadowBellman: |
      dV = (c)^(-γ)

  dcsn_to_arvl_mover:
    Bellman: |
      V[<] = E_{y}(V)
    ShadowBellman: |
      dV[<] = E_{y}(dV)

domain:
  w: [w_domain_min, w_domain_max]

options:
  grid: !Cartesian
    orders: [n_w]
    bounds: [[w_grid_min, w_grid_max]]

dolo_plus:
  dialect: adc-stage
  version: 0.1
  method: egm

  information_timing:
    shocks:
      - name: y
        realized_between_slots: [-1, 0]
        observed_at_slot: 0

  slot_map:
    ustate_name: x
    x[-1]: {group: prestate, tokens: [b]}
    x[0]:  {group: states, tokens: [w]}
    x[+1]: {group: poststates, tokens: [a]}

  validation:
    allow_indexed_tokens: [V, dV, x, c, b, w, a, y]
    index_aliases:
      "+1": 1
      "1": 1
      "-1": -1
      "m1": -1
      "_arvl": -1
      "_dcsn": 0
      "_cntn": 1
    shift_rules:
      canonical_slot: {c: 0}
      allow: {c: [>]}
      disallow: {c: [<]}

  operators:
    E_y: {over: y, default_location: a}

