# Portfolio stage (B3): choose risky share, then realize **all shocks jointly**.
#
# B3 timing idea:
# - Portfolio choice is made at the decision perch.
# - Return + income shocks are realized *after* the decision (between dcsn and cntn),
#   so the agent cannot condition the choice on them.
# - The continuation state is cash-on-hand `m` (Pablo's `w`), which becomes the
#   arrival prestate for the next consumption stage.
#
# Why: this is the simplest way to allow unrestricted correlation across shocks
# (no conditional-expectation machinery required).

# The notation of this version assumes that the portfolio stage follows the consumption stage
# because 'a' is the name of assets-after-all-actions-are-accomplished IN THE CONSUMPTION STAGE.

# So you end up with a_{t}=A_{t}/P_{t}

symbols:
  prestate:
    a: "@in R+"           # Xa stands for the domain of the state variable in the 'arrival' perch

  exogenous:
    # Realized between decision and continuation (post-decision).
    ylog: # log-transitoryincome-shock
      - "@in R"                   # lim as y goes down to -infty is = 0 is the lower bound of the 
      - "@dist Normal(-(0.5) * σ_ylog**2, σ_ylog)"  # normal distribution with mean μ_y and standard deviation σ_y
    riskylog:
      - "@in R"                   # lim as risky goes down to -infty is = 0 is the lower bound of the log risky return factor
      - "@dist Normal(-(0.5) * σ_riskylog**2, σ_riskylog)"

      # actually, we really want to make this a joint shock (ylog, riskylog) with a covariance but haven't done it yet

  states:
    k: "@in R+"           # Xk stands for the domain of the state variable in the 'decision' perch

  controls:
    shr: "@in [0,1]"

  poststates:
    m: "@in R+"

  values:
    V[<]: "@in R"  # should this be extended reals (CDC says no; AAS will think about it)
    V: "@in R"
    V[>]: "@in R"
 
  parameters:
    Rfree: "@in R++"
    μ_ylog: "@in R"
    σ_ylog: "@in R+"
    μ_riskylog: "@in R"
    σ_riskylog: "@in R+"

equations:
  cntn_to_dcsn_builder:
    Bellman: | # At the point of the decision perch, share is a control variable.
      # The value function is defined as the maximum expected value of the continuation stage,
      # V is syntactic sugar for V_fn_dcsn(k) (where see below for k)
      V = max_{shr} E(V[>])      # This defines the shr function
      shr = argmax_{shr} E(V[>]) # semantic parser: knows this is V_fn_cntn(m[>]) because the parser know how to interpet the dcsn_to_cntntransition equation

  arvl_to_dcsn_transition: | # Nothing happens to k between the arrival and decision perch
    k = a    # Akshay wants perch tag here to make the parsing easier; CDC thinks eventually they should go (the equation should be k = a)

  # All shocks are realized after the portfolio decision.
  dcsn_to_cntn_transition: | # again CDC thinks eventually we will not want the [>]/unmarked tags
    m = exp(ylog) + k*(shr*exp(riskylog) + (1-shr)*Rfree)

  dcsn_to_arvl_builder:
    Bellman: |
      V[<] = V # the parser knows that this is actually V_fn_arvl(a[<]) = V_fn_dcsn(k[<]) because the semantic parser knows to apply the arvl_to_dcsn_transition equation (except on measure 0 sets)