# Portfolio stage (B3): choose risky share, then realize **all shocks jointly**.
#
# B3 timing idea:
# - Portfolio choice is made at the decision perch.
# - Return + income shocks are realized *after* the decision (between dcsn and cntn),
#   so the agent cannot condition the choice on them.
# - The continuation state is cash-on-hand `m` (Pablo's `w`), which becomes the
#   arrival prestate for the next consumption stage.
#
# Why: this is the simplest way to allow unrestricted correlation across shocks
# (no conditional-expectation machinery required).

symbols:
  spaces:
    Xa: "@def R+"         # assets to invest (from the consumption stage)
    Xk: "@def R+"
    Xm: "@def R+"         # cash-on-hand after shocks (input to next cons stage)
    XR: "@def R++"        # risky gross return factor support
    Y:  "@def R"          # log-income shock support
    Π:  "@def [0,1]"      # share space

  prestate:
    a: "@in Xa"

  exogenous:
    # Realized between decision and continuation (post-decision).
    y:
      - "@in Y"
      - "@dist Normal(μ_y, σ_y)"
    Risky:
      - "@in XR"
      - "@dist LogNormal(μ_Risky, σ_Risky)"

  states:
    k: "@in Xk"

  controls:
    shr: "@in Π"

  poststates:
    m: "@in Xm"

  values:
    V: "@in R"

  parameters:
    Rf: "@in R++"
    μ_y: "@in R"
    σ_y: "@in R+"
    μ_Risky: "@in R"
    σ_Risky: "@in R+"

equations:
  arvl_to_dcsn_transition: |
    k = a

  # All shocks are realized after the portfolio decision.
  dcsn_to_cntn_transition: |
    m = exp(y) + k*(shr*Risky + (1-shr)*Rf)

  cntn_to_dcsn_builder:
    Bellman: |
      V = max_{shr}(E_{y,Risky}(V[>]))

  dcsn_to_arvl_builder:
    Bellman: |
      V[<] = V