# Consumption stage (B3): EGM-style, **no shocks inside the stage**.
#
# B3 timing idea (from CDC email 2026-01-21):
# - All shocks (income + returns, potentially correlated) are realized *after*
#   the portfolio decision, inside the portfolio stage.
# - The consumption stage therefore takes fully-realized cash-on-hand `m`
#   (Pablo's `w`) as both its arrival input and its decision resource.
#
# Implementation note:
# - We keep separate symbols `m` (prestate) and `w` (decision state) but make the
#   arrival→decision transition identity: w[_dcsn] = m[_arvl].

symbols:
  spaces:
    Xw: "@def R+"     # decision resources (same numeric space as Xm)
    Xa: "@def R+"     # end-of-stage assets (savings)

  prestate:
    w_prestate: "@in R+"  # m must be positive

  states:
    w: "@in R+"  # 

  poststates:
    a: "@in Xa"

  controls:
    c: "@in R+"

  values:
    V[_arvl]: "@in R"
    V[_dcsn]: "@in R"
    V[_cntn]: "@in R"

  values_marginal:
    dV[_arvl]: "@in R+"
    dV[_dcsn]: "@in R+"
    dV[_cntn]: "@in R+"

  parameters:
    β: "@in (0,1)"
    γ: "@in R+"

  settings: # settings for methods - AAS think about it
    n_w: "@in Z+"
    w_domain_min: "@in R+"
    w_domain_max: "@in R+"
    w_grid_min: "@in R+"
    w_grid_max: "@in R+"
    # The settings will need to be compatible with the methods being used - AAS think about it

equations:
  # No shocks between arrival and decision in B3:
  arvl_to_dcsn_transition: |
    w = w_prestate # x_v = g_av(x_a)

  dcsn_to_cntn_transition: | # CDC says eventually [_cntn]/[_dcsn] should go away
    a = w - c      # x_e = g_ve(c_fn_dcsn(x_v),x_v) 
    
  # Reverse state mapping (EGM-style):
  cntn_to_dcsn_transition: |
    w[_cntn] = a + c[_dcsn] # syntactic sugar for w_fn_cntn(a, c) = w_fn_dcsn(a[_dcsn], c[_dcsn])

  cntn_to_dcsn_mover:
    Bellman: | 
      V[_dcsn] = max_{c}((c^(1-γ))/(1-γ) + β*V[_cntn])    # V_fn_dcsn(w[_dcsn]) = max_{c} (c[_dcsn]^(1-γ))/(1-γ) + β*V_fn_cntn(w[_cntn]) 
      c[_dcsn] = argmax_{c}((c^(1-γ))/(1-γ) + β*V[_cntn]) # semantic parser: knows this is V_fn_cntn(w[_cntn]) because the parser know how to interpet the cntn_to_dcsn_transition equation
    InvEuler: |
      c[_cntn] = (β*dV[_cntn])^(-1/γ)
    ShadowBellman: |
      dV[_dcsn] = (c[_dcsn])^(-γ)

  # No expectation needed at arrival in B3: the stage is deterministic.
  dcsn_to_arvl_mover:
    Bellman: |
      V[_arvl] = V[_dcsn]
    ShadowBellman: |
      dV[_arvl] = dV[_dcsn]

domain:
  w: [w_domain_min, w_domain_max]

options:
  grid: !Cartesian
    orders: [n_w]
    bounds: [[w_grid_min, w_grid_max]]

dolo_plus:
  dialect: adc-stage
  version: 0.1
  method: egm

  slot_map:
    ustate_name: x
    x[-1]: {group: prestate, tokens: [m]}
    x[0]:  {group: states, tokens: [w]}
    x[+1]: {group: poststates, tokens: [a]}

  validation:
    allow_indexed_tokens: [V, dV, x, c, m, w, a]
    index_aliases:
      "+1": 1
      "1": 1
      "-1": -1
      "m1": -1
      "_arvl": -1
      "_dcsn": 0
      "_cntn": 1
    shift_rules:
      canonical_slot: {c: 0}
      allow: {c: [_cntn]}
      disallow: {c: [_arvl]}

