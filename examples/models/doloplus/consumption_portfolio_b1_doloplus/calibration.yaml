# Calibration bindings for the two-stage B1 sketch.
#
# Applied after loading the syntactic stage YAMLs.

calibration:
  parameters:
    β: 0.96
    γ: 4.0

    # Risk-free gross return
    Rf: 1.01

    # Income shock (log income)
    μ_y: 0.0
    σ_y: 0.10

    # Risky return shock (gross return factor, placeholder)
    μ_R: 0.0
    σ_R: 0.20
