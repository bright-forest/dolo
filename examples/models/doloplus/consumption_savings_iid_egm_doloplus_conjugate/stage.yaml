# Conjugate Bellman Transform of consumption_savings_iid_egm_doloplus
#
# SEMICONJUGATE TRANSFORMATION (Stachurski Iterates Lemma)
# =========================================================
#
# Original (S = E ∘ max):
#   V[_arvl] = E_y[ max_c{ u(c) + β*V'[_arvl] } ]
#   The expectation is OUTSIDE the maximization.
#
# Conjugate (Ŝ = max ∘ E):
#   V[_arvl] = max_c{ u(c) + β*E_y[V'[_arvl]] }
#   The expectation is INSIDE the maximization (in the continuation value).
#
# Key insight: The expectation moves INSIDE the decision problem.
# The agent optimizes over a SMOOTH continuation value (expectation already done).
#
# By the Iterates Lemma: S^n = G ∘ Ŝ^{n-1} ∘ F

symbols:
  spaces:
    Xb: "@def R+"     # prestate assets domain
    Xw: "@def R+"     # decision wealth domain  
    Xa: "@def R+"     # end-of-period assets domain
    Y:  "@def R"      # shock support (log income)

  prestate:
    b: "@in Xb"
  exogenous:
    y:
      - "@in Y"
      - "@dist Normal(μ_y, σ_y)"
  states:
    w: "@in Xw"
  poststates:
    a: "@in Xa"
  controls:
    c: "@in R+"

  values:
    V: "@in R"
  shadow_value:
    dV: "@in R+"

  parameters:
    β: "@in (0,1)"
    γ: "@in R+"
    ρ: "@in R"
    r: "@in R++"
    μ_y: "@in R"
    σ_y: "@in R+"

  settings:
    n_w: "@in Z+"
    n_y_nodes: "@in Z+"
    n_sim: "@in Z+"
    sim_seed: "@in Z+"
    w_domain_min: "@in R+"
    w_domain_max: "@in R+"
    w_grid_min: "@in R+"
    w_grid_max: "@in R+"

equations:
  # ===========================================================================
  # TRANSITIONS (same structure as original)
  # ===========================================================================
  # The transitions describe the state evolution. The shock still appears
  # at arvl_to_dcsn (income realization), but the VALUE FUNCTION structure
  # is what changes in the conjugate form.

  arvl_to_dcsn_transition: |
    w[_dcsn] = exp(y[_dcsn]) + b[_arvl]*r

  dcsn_to_cntn_transition: |
    a[_cntn] = w[_dcsn] - c[_dcsn]

  cntn_to_dcsn_transition: |
    w[_dcsn] = a[_cntn] + c[_dcsn]

  # ===========================================================================
  # MOVERS (Backward Operators) - THE KEY DIFFERENCE
  # ===========================================================================
  #
  # ORIGINAL STRUCTURE:
  #   cntn_to_dcsn_mover: V[_dcsn] = max_c{ u(c) + β*V[_cntn] }
  #   dcsn_to_arvl_mover: V[_arvl] = E_y(V[_dcsn])
  #   Combined: V[_arvl] = E_y[ max_c{ u(c) + β*V[_cntn] } ]
  #
  # CONJUGATE STRUCTURE:
  #   cntn_to_dcsn_mover: V[_dcsn] = max_c{ u(c) + β*E_y(V[_cntn]) }
  #                                                ^^^^
  #                       Expectation is INSIDE the max!
  #   dcsn_to_arvl_mover: V[_arvl] = V[_dcsn]  (identity)
  #   Combined: V[_arvl] = max_c{ u(c) + β*E_y[V[_cntn]] }
  #
  # The agent sees a SMOOTH continuation value (expectation already computed)
  # ===========================================================================

  cntn_to_dcsn_mover:
    # CONJUGATE: Expectation is INSIDE the decision problem
    # The continuation value E_y(V[_cntn]) is smooth, making optimization easier
    Bellman: |
      V[_dcsn] = max_{c}((c[_dcsn]^(1-γ))/(1-γ) + β*E_{y}(V[_cntn]))
    
    # EGM inverse: marginal value of the expected continuation
    InvEuler: |
      c[_cntn] = (β*E_{y}(dV[_cntn]))^(-1/γ)
    
    # Shadow value at decision
    ShadowBellman: |
      dV[_dcsn] = (c[_dcsn])^(-γ)

  dcsn_to_arvl_mover:
    # CONJUGATE: Identity (no expectation here - it's inside the decision)
    Bellman: |
      V[_arvl] = V[_dcsn]
    ShadowBellman: |
      dV[_arvl] = dV[_dcsn]

# Domain + options
domain:
  w: [w_domain_min, w_domain_max]

options:
  grid: !Cartesian
    orders: [n_w]
    bounds: [[w_grid_min, w_grid_max]]

dolo_plus:
  dialect: adc-stage-conjugate
  version: 0.1
  method: egm

  # Information timing is the SAME as original
  # The shock is still realized between arvl and dcsn
  # What changes is the VALUE FUNCTION structure, not the state dynamics
  information_timing:
    shocks:
      - name: y
        realized_between_slots: [-1, 0]
        observed_at_slot: 0

  slot_map:
    ustate_name: x
    x[-1]: {group: prestate, tokens: [b]}
    x[0]:  {group: states, tokens: [w]}
    x[+1]: {group: poststates, tokens: [a]}

  validation:
    allow_indexed_tokens: [V, dV, x, c, b, w, a, y]
    index_aliases:
      "+1": 1
      "1": 1
      "-1": -1
      "m1": -1
      "_arvl": -1
      "_dcsn": 0
      "_cntn": 1
    shift_rules:
      canonical_slot: {c: 0}
      allow: {c: [_cntn]}
      disallow: {c: [_arvl]}

  # CONJUGATE: The expectation operator now appears INSIDE the decision mover
  operators:
    E_y: 
      over: y
      default_location: dcsn  # Used inside cntn_to_dcsn_mover
      position: inside_decision  # NEW: marks this as conjugate form

  equation_symbols:
    arvl_to_dcsn_transition: g_ad
    dcsn_to_cntn_transition: g_de
    cntn_to_dcsn_transition: g_ed
    cntn_to_dcsn_mover: T_ed
    dcsn_to_arvl_mover: T_da

  inter_stage_links:
    lead(x[_arvl]): x[_cntn]
    lead(V[_arvl]): V[_cntn]
    lead(dV[_arvl]): dV[_cntn]

  # ===========================================================================
  # SEMICONJUGACY DOCUMENTATION
  # ===========================================================================
  semiconjugacy:
    relation: conjugate
    original: "../consumption_savings_iid_egm_doloplus/stage.yaml"

    transformation: |
      The expectation operator E_y moves from OUTSIDE to INSIDE the max.
      
      Original:  V = E_y[ max_c{ u(c) + βV' } ]
                     ^^^^ outside
      
      Conjugate: V = max_c{ u(c) + β·E_y[V'] }
                                   ^^^^ inside
      
      This is NOT about moving movers. It's about the structure of the
      decision problem. The agent optimizes over a smooth continuation
      value (the expectation is already computed).

    original_operator: |
      S = E_y ∘ max_c
      cntn_to_dcsn_mover: V[_dcsn] = max_c{ u(c) + β*V[_cntn] }
      dcsn_to_arvl_mover: V[_arvl] = E_y(V[_dcsn])

    conjugate_operator: |
      Ŝ = max_c ∘ E_y
      cntn_to_dcsn_mover: V[_dcsn] = max_c{ u(c) + β*E_y(V[_cntn]) }
      dcsn_to_arvl_mover: V[_arvl] = V[_dcsn]

    computational_advantage: |
      In the conjugate form:
      1. First compute E_y[V[_cntn]] for all continuation states
      2. Then solve ONE smooth optimization problem
      
      The max is over a differentiable function, enabling:
      - Faster convergence
      - Better numerical stability  
      - Natural fit with EGM (endogenous grid method)

    F_map: |
      F: V → Ṽ where Ṽ(a) = E_y[V(g(a,y))]
      Transforms value to its "expected" version

    G_map: |
      G: Ṽ → V where V(w) = max_c{u(c) + β*Ṽ(w-c)}
      Optimizes over smooth expected continuation

    iterates_lemma: |
      S^n = G ∘ Ŝ^{n-1} ∘ F
      Iterate in conjugate space, then transform back
