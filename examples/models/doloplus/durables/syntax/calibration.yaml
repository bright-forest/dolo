# Calibration for the durables / housing adjustment cost model
# Reference: Dobrescu & Shanker, Application 2
calibration:
  # Financial returns
  r: 0.024
  R: 1.024                      # = 1 + r
  r_H: 0.1
  R_H: 1.1                     # = 1 + r_H

  # Preferences
  beta: 0.945
  alpha: 0.66                   # consumption weight in utility
  gamma_c: 1.458                # CRRA for consumption
  gamma_h: 1.0                  # CRRA for housing (log utility when = 1)
  kappa: 1.0                    # housing scaling factor

  # Housing frictions
  delta: 0.1                    # housing depreciation rate
  tau: 0.2                      # proportional adjustment cost

  # Constraints
  b: 0.01                       # borrowing constraint

  # Terminal value
  theta: 2
  K: 200

  # Horizon
  T: 60

  # Wage / income process (AR(1) via Tauchen)
  phi_w: 0.9170411              # persistence of log earnings
  sigma_w: 0.0817012            # std dev of earnings innovation
  N_wage: 3                     # number of discrete Markov states
