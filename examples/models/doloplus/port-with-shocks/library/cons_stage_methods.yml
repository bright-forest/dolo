# Methodization (spec_0.1d) for `cons_stage.yaml`
#
# Deterministic consumption-choice stage (EGM-friendly).
# Stage-specific methodization lets us attach EGM here without affecting
# expectation-only stages (e.g., noport_stage).

stage: cons_stage

methods:
  # ---------------------------------------------------------------------------
  # Backward mover (EGM)
  # ---------------------------------------------------------------------------
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !egm

      - scheme: interpolation
        method: !Cartesian
        settings:
          orders: [n_m]
          bounds: [[m_min, m_max]]

  - on: cntn_to_dcsn_mover.InvEuler
    schemes:
      - scheme: egm_core
        method: !inverse-euler

  - on: cntn_to_dcsn_mover.MarginalBellman
    schemes:
      - scheme: envelope
        method: !marginal-value

  - on: cntn_to_dcsn_mover.cntn_to_dcsn_transition
    schemes: []

  # ---------------------------------------------------------------------------
  # Arrival mover (identity)
  # ---------------------------------------------------------------------------
  - on: dcsn_to_arvl_mover
    schemes: []

  - on: dcsn_to_arvl_mover.Bellman
    schemes: []

  - on: dcsn_to_arvl_mover.ShadowBellman
    schemes: []

  # ---------------------------------------------------------------------------
  # Transitions (pure functions)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_transition
    schemes: []

  - on: dcsn_to_cntn_transition
    schemes: []

  # ---------------------------------------------------------------------------
  # Forward movers (simulation)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_mover
    schemes:
      - scheme: simulation
        method: !deterministic

  - on: dcsn_to_cntn_mover
    schemes: []

