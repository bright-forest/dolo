# Example: Portfolio Choice with Correlated Shocks — Stage: port
#
# Portfolio stage with post-decision correlated shocks:
# - arvl/dcsn state: k (investable assets)
# - decision: risky share ς ∈ [0,1]
# - post-decision shock vector ζ = (Ψ, θ) realized jointly in dcsn→cntn
# - cntn state: m = k*(ς*Ψ + (1-ς)*R) + θ
#
# The Bellman form is max-over-expectation:  V(k) = max_ς E_{Ψ,θ}[Ve(m)].

name: port_stage

symbols:
  spaces:
    Xk: "@def R++"
    Xm: "@def R++"
    Π:  "@def [0,1]"
    Rp: "@def R++"
    Θ:  "@def R++"

  prestate:
    k: "@in Xk"

  states:
    k_d: "@in Xk"

  controls:
    ς: "@in Π"

  # Shocks realized after the portfolio decision (post-decision timing).
  # Joint vector ζ = (Ψ, θ): correlated LogNormals via underlying Normal.
  exogenous:
    Ψ: "@in Rp"
    θ: "@in Θ"
    ζ:
      "@dist": Normal
      Μ: [μ_Ψ, μ_θ]
      Σ: [[σ_Ψ^2, ρ_ζ*σ_Ψ*σ_θ], [ρ_ζ*σ_Ψ*σ_θ, σ_θ^2]]

  poststates:
    m: "@in Xm"

  values:
    V[<]: "@in R"
    V: "@in R"
    V[>]: "@in R"

  parameters:
    R: "@in R++"
    μ_Ψ: "@in R"
    σ_Ψ: "@in R+"
    μ_θ: "@in R"
    σ_θ: "@in R+"
    ρ_ζ: "@in [-1,1]"   # correlation of underlying normals in joint vector ζ

equations:
  # No shocks between arrival and decision:
  arvl_to_dcsn_transition: |
    k_d = k

  # Joint post-decision shocks realized in the dcsn→cntn transition:
  dcsn_to_cntn_transition: |
    m = k_d*(ς*Ψ + (1-ς)*R) + θ

  # Decision value: max-over-expectation (post-decision shocks).
  cntn_to_dcsn_mover:
    Bellman: |
      V = max_{ς}(E_{Ψ,θ}(V[>]))
      ς = argmax_{ς}(E_{Ψ,θ}(V[>]))

  # No expectation at arrival (deterministic arvl→dcsn):
  dcsn_to_arvl_mover:
    Bellman: |
      V[<] = V

dolo_plus:
  dialect: adc-stage
  version: 0.1

  # Canonical equation symbols for translator
  equation_symbols:
    arvl_to_dcsn_transition: g_ad
    dcsn_to_cntn_transition: g_de
    cntn_to_dcsn_mover: T_ed
    dcsn_to_arvl_mover: T_da

  # Sub-equation symbols within movers
  mover_sub_equations:
    T_ed:
      Bellman: T_ed_Bellman
    T_da:
      Bellman: T_da_Bellman

  # Slot map: prestate → poststate linkage
  slot_map:
    prestate: k       # arrival state (investable assets)
    poststate: m      # continuation state (cash-on-hand after returns + income)

