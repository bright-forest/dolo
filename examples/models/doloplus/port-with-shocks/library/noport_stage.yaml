# Example: Portfolio Choice with Correlated Shocks — Stage: noport
#
# Shock realization stage with no decision:
# - arvl/dcsn state: k (investable assets)
# - post-decision shock: θ (transitory income) realized in dcsn→cntn
# - cntn state: m = k*R + θ
#
# This stage is useful both as:
# - a “no-portfolio” period (noport→cons), and
# - a bridge when we need to go from an a-ending object to an m-starting object across periods.

name: noport_stage

symbols:
  spaces:
    Xk: "@def R++"
    Xm: "@def R++"
    Θ:  "@def R++"

  prestate:
    k: "@in Xk"

  # Shock realized after (trivial) decision
  exogenous:
    θ:
      - "@in Θ"
      - "@dist LogNormal(μ_θ, σ_θ)"

  states:
    k_d: "@in Xk"

  poststates:
    m: "@in Xm"

  values:
    V[<]: "@in R"
    V: "@in R"
    V[>]: "@in R"

  parameters:
    R: "@in R++"
    μ_θ: "@in R"
    σ_θ: "@in R+"

  # Numerical settings (referenced by methodization.yml)
  settings:
    n_m: "@in Z+"
    m_min: "@in R+"
    m_max: "@in R+"
    n_θ_nodes: "@in Z+"
    n_sim: "@in Z+"
    sim_seed: "@in Z+"

equations:
  # No shock between arrival and decision:
  arvl_to_dcsn_transition: |
    k_d = k

  # Shock realized after decision (dcsn→cntn):
  dcsn_to_cntn_transition: |
    m = k_d*R + θ

  # No choice ⇒ decision value is just an expectation over the post-decision shock.
  cntn_to_dcsn_mover:
    Bellman: |
      V = E_{θ}(V[>])

  # No expectation at arrival (deterministic arvl→dcsn):
  dcsn_to_arvl_mover:
    Bellman: |
      V[<] = V

dolo_plus:
  dialect: adc-stage
  version: 0.1

  # Canonical equation symbols for translator
  equation_symbols:
    arvl_to_dcsn_transition: g_ad
    dcsn_to_cntn_transition: g_de
    cntn_to_dcsn_mover: T_ed
    dcsn_to_arvl_mover: T_da

  # Slot map: prestate → poststate linkage for inter-period wiring
  slot_map:
    prestate: k      # arrival state (from previous period's poststate)
    poststate: m     # continuation state (becomes next stage's prestate)

  # Perch index aliases (defaults)
  validation:
    index_aliases:
      "<": -1
      "": 0
      ">": 1

