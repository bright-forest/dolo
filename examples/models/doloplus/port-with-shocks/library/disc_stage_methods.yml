# Methodization (spec_0.1d) for `disc_stage.yaml`
#
# Trivial stage: no optimization, no shocks, no interpolation grid.
# The backward mover is a scalar multiplication V = β * V[>].

stage: disc_stage

methods:
  # ---------------------------------------------------------------------------
  # Backward mover (scalar multiplication, no maximization)
  # ---------------------------------------------------------------------------
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !scalar-multiply
        description: "Discount mover: V_dcsn = β * V_cntn"

  - on: cntn_to_dcsn_mover.Bellman
    schemes: []

  # ---------------------------------------------------------------------------
  # Arrival mover (identity)
  # ---------------------------------------------------------------------------
  - on: dcsn_to_arvl_mover
    schemes: []

  - on: dcsn_to_arvl_mover.Bellman
    schemes: []

  # ---------------------------------------------------------------------------
  # Transitions (identity functions)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_transition
    schemes: []

  - on: dcsn_to_cntn_transition
    schemes: []

  # ---------------------------------------------------------------------------
  # Forward movers (simulation — identity pass-through)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_mover
    schemes:
      - scheme: simulation
        method: !deterministic

  - on: dcsn_to_cntn_mover
    schemes:
      - scheme: simulation
        method: !deterministic
