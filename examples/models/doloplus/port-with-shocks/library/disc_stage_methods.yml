# Methodization (spec_0.1d) for `disc_stage.yaml`
#
# Trivial stage: no optimization, no shocks, no interpolation grid.
# The backward builder is a scalar multiplication V = β * V[>].

stage: disc_stage

methods:
  # ---------------------------------------------------------------------------
  # Backward builder (scalar multiplication, no maximization)
  # ---------------------------------------------------------------------------
  - on: cntn_to_dcsn_builder
    schemes:
      - scheme: bellman_backward
        method: !scalar-multiply
        description: "Discount builder: V_dcsn = β * V_cntn"

  - on: cntn_to_dcsn_builder.Bellman
    schemes: []

  # ---------------------------------------------------------------------------
  # Arrival builder (identity)
  # ---------------------------------------------------------------------------
  - on: dcsn_to_arvl_builder
    schemes: []

  - on: dcsn_to_arvl_builder.Bellman
    schemes: []

  # ---------------------------------------------------------------------------
  # Transitions (identity functions)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_transition
    schemes: []

  - on: dcsn_to_cntn_transition
    schemes: []

  # ---------------------------------------------------------------------------
  # Forward builders (simulation — identity pass-through)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_builder
    schemes:
      - scheme: simulation
        method: !deterministic

  - on: dcsn_to_cntn_builder
    schemes:
      - scheme: simulation
        method: !deterministic
