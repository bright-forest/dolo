# Example: Portfolio Choice with Correlated Shocks — Stage: disc
#
# Discounting stage (period-terminal, no economic content):
# - All transitions are identity: state passes through unchanged
# - No shocks, no optimization, no stage reward
# - Sole purpose: apply discount factor β to continuation value
#
# By extracting β into its own stage, all economic stages
# (cons, port) become symmetric with β = 1.
# See: docs/development/references/unified/sections/stage-disc.md

name: disc_stage

symbols:
  spaces:
    Xa: "@def R+"

  prestate:
    a: "@in Xa"

  states:
    a_d: "@in Xa"

  poststates:
    a: "@in Xa"

  values:
    V[<]: "@in R"
    V: "@in R"
    V[>]: "@in R"

  parameters:
    β: "@in (0,1)"

equations:
  # Identity: arrival state = decision state
  arvl_to_dcsn_transition: |
    a_d = a

  # Identity: decision state = continuation state
  dcsn_to_cntn_transition: |
    a = a_d

  # Backward mover: scale continuation value by β
  cntn_to_dcsn_mover:
    Bellman: |
      V = β*V[>]

  # Identity: arrival value = decision value
  dcsn_to_arvl_mover:
    Bellman: |
      V[<] = V

dolo_plus:
  dialect: adc-stage
  version: 0.1

  equation_symbols:
    arvl_to_dcsn_transition: g_ad
    dcsn_to_cntn_transition: g_de
    cntn_to_dcsn_mover: T_ed
    dcsn_to_arvl_mover: T_da

  slot_map:
    prestate: a
    poststate: a

  validation:
    index_aliases:
      "<": -1
      "": 0
      ">": 1
