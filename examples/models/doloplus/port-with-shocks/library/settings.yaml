# Numerical settings for port-with-shocks stages
#
# Grid sizes, bounds, and simulation parameters.
# Referenced by methodization.yml via settings symbol names.

settings:
  # ---------------------------------------------------------------------------
  # State space grids
  # ---------------------------------------------------------------------------

  # Cash-on-hand grid (m) for cons_stage
  n_m: 100
  m_min: 0.01
  m_max: 10.0

  # Assets grid (a) for cons_stage continuation
  n_a: 100
  a_min: 0.0
  a_max: 10.0

  # Investable assets grid (k) for port_stage, noport_stage
  n_k: 100
  k_min: 0.01
  k_max: 10.0

  # ---------------------------------------------------------------------------
  # Quadrature nodes for expectations
  # ---------------------------------------------------------------------------

  # Transitory income shock θ
  n_θ_nodes: 7

  # Risky return shock Ψ
  n_Ψ_nodes: 7

  # Joint (Ψ, θ) quadrature (if using tensor product)
  n_joint_nodes: 49   # 7 × 7

  # ---------------------------------------------------------------------------
  # Simulation
  # ---------------------------------------------------------------------------
  n_sim: 10000
  sim_seed: 42

  # ---------------------------------------------------------------------------
  # Solver tolerances
  # ---------------------------------------------------------------------------
  tol_vfi: 1.0e-8
  max_iter: 1000
