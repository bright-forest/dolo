# Calibration for port-with-shocks stages
#
# Unified calibration covering all stages in this library:
#   - cons_stage: consumption-savings with CRRA utility
#   - port_stage: portfolio choice with risky/safe assets
#   - noport_stage: no-portfolio shock realization
#
# Parameters are shared across stages where names overlap.

calibration:
  parameters:
    # -------------------------------------------------------------------------
    # Preferences (cons_stage)
    # -------------------------------------------------------------------------
    β: 0.96          # discount factor
    ρ: 2.0           # CRRA risk aversion (1/EIS)

    # -------------------------------------------------------------------------
    # Returns (port_stage, noport_stage)
    # -------------------------------------------------------------------------
    R: 1.02          # gross risk-free return

    # -------------------------------------------------------------------------
    # Risky return shock Ψ (port_stage only)
    # LogNormal(μ_Ψ, σ_Ψ) with E[Ψ] ≈ 1.06 (6% expected excess return)
    # -------------------------------------------------------------------------
    μ_Ψ: 0.04        # log-mean of risky return
    σ_Ψ: 0.15        # log-std of risky return

    # -------------------------------------------------------------------------
    # Transitory income shock θ (port_stage, noport_stage)
    # LogNormal(μ_θ, σ_θ) with E[θ] = 1.0
    # -------------------------------------------------------------------------
    μ_θ: 0.0         # log-mean of transitory income (normalized)
    σ_θ: 0.1         # log-std of transitory income

    # -------------------------------------------------------------------------
    # Shock correlation (port_stage placeholder)
    # -------------------------------------------------------------------------
    ρ_ζ: 0.0         # correlation between Ψ and θ (not yet wired)
