# Period template: cons_port_period (cons → port)
#
# Stage sequence (within a period):
#   cons → port
#
# Intra-period wiring requires a rename:
# - cons outputs a
# - port expects k
# so we need an internal connector: k = a

name: cons_port_period

stages:
  - cons_stage
  - port_stage

# Proposed (optional) explicit connector declarations for period assembly.
# Current repo examples keep connections implicit; this block documents the intended wiring.
connectors:
  - from: cons_stage
    to: port_stage
    rename: {a: k}

