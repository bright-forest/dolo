# Example: Portfolio Choice with Correlated Shocks — Stage: cons
#
# Deterministic consumption stage (no shocks in this stage):
# - arvl/dcsn state: m (cash-on-hand, already fully realized by noport/port)
# - decision: consumption c ∈ (0,m)
# - cntn state: a = m - c
#
# This is the “EGM-friendly” stage: expectation is not needed inside the stage.
# The basic ingredients we need to define are: g_av, g_ve, T_bellman, T_va

name: cons_stage

symbols:
  spaces:
    Xm: "@def R++"
    Xa: "@def R+"

  prestate:
    m: "@in Xm"

  states:
    m_d: "@in Xm"

  poststates:
    a: "@in Xa"

  controls:
    c: "@in R+"

  values:
    V[_arvl]: "@in R"
    V[_dcsn]: "@in R"
    V[_cntn]: "@in R"

  values_marginal:
    dV[_arvl]: "@in R+"
    dV[_dcsn]: "@in R+"
    dV[_cntn]: "@in R+"

  parameters:
    β: "@in (0,1)"
    ρ: "@in R+"

equations:
  # No shock between arrival and decision:
  arvl_to_dcsn_transition: |  # this defines the g_av function. g_av  is a canonical core math object that needs to be defined in the stage syntax and this equation defines it. (see all the docs on the math - stage syntax mapping)
    m_d = m

  dcsn_to_cntn_transition: |  # this defines the g_ve function
    a = m_d - c[_dcsn]

  # BACKWARD ITERATION BELOW
  cntn_to_dcsn_mover:
    Bellman: |
      u = (c^(1-ρ))/(1-ρ) # this is just an arbitary equation -- ie a string replacement operation . the question whether we want to be able to define arbitrary *function* not just of the state, but of some variable. 
      V[_dcsn] = max_{c}u + β*V[_cntn]) # V[_dcsn] = V_fn_dcsn(x_dcsn) = V_fn_dcsn(m_d) 
      c[_dcsn] = argmax_{c}((c^(1-ρ))/(1-ρ) + β*V[_cntn]) #!!IMPORTANT!!: NOTE that even with the consumed function c[_cntn] defined below, we still do not explicitly specify how argmax is computed! This is the key to the EGM-style representation.
    InvEuler: |
      c[_cntn] = (β*dV[_cntn])^(-1/ρ)
    MarginalBellman: |
      dV[_dcsn] = (c[_dcsn])^(-ρ)
    cntn_to_dcsn_transition: |
      m_d[_cntn] = a + c[_cntn]                     # Reverse mapping used by EGM-style representations:



  # Deterministic arvl→dcsn:
  dcsn_to_arvl_mover:
    Bellman: |
      V[_arvl] = V[_dcsn]
    ShadowBellman: |
      dV[_arvl] = dV[_dcsn]

