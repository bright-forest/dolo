# Methodization (spec_0.1d) for `port_stage.yaml`
#
# Portfolio-choice stage with post-decision correlated shocks (Ψ, θ).
# Solved by VFI: V(k) = max_ς E_{Ψ,θ}[V_cont(m(k,ς,Ψ,θ))].

stage: port_stage

methods:
  # ---------------------------------------------------------------------------
  # Operator instances (expectation over joint shocks)
  # ---------------------------------------------------------------------------
  - on: E_Ψ_θ
    schemes:
      - scheme: expectation
        method: !gauss-hermite
        settings:
          n_nodes: n_joint_nodes

  # ---------------------------------------------------------------------------
  # Backward builder (VFI: max over ς, expectation over shocks)
  # ---------------------------------------------------------------------------
  - on: cntn_to_dcsn_builder
    schemes:
      # Solve method: value function iteration (direct maximization)
      - scheme: bellman_backward
        method: !vfi

      # Decision state grid: Cartesian discretization of k
      - scheme: grid
        method: !Cartesian
        settings:
          orders: [n_k]
          bounds: [[k_min, k_max]]

      # Interpolation of the value function between grid points
      - scheme: interpolation
        method: !linear

      # Optimization over control ς
      # Control bounds come from stage YAML: ς ∈ Π = [0,1]
      - scheme: maximization
        method: !scipy-bounded

  - on: cntn_to_dcsn_builder.Bellman
    schemes: []

  # ---------------------------------------------------------------------------
  # Arrival builder (identity — no shock between arvl and dcsn)
  # ---------------------------------------------------------------------------
  - on: dcsn_to_arvl_builder
    schemes: []

  - on: dcsn_to_arvl_builder.Bellman
    schemes: []

  # ---------------------------------------------------------------------------
  # Transitions (pure functions — compiled from equation strings)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_transition
    schemes: []

  - on: dcsn_to_cntn_transition
    schemes: []

  # ---------------------------------------------------------------------------
  # Forward builders (simulation)
  # ---------------------------------------------------------------------------
  - on: arvl_to_dcsn_builder
    schemes:
      - scheme: simulation
        method: !deterministic

  - on: dcsn_to_cntn_builder
    schemes:
      - scheme: simulation
        method: !monte-carlo
        settings:
          n_paths: n_sim
          seed: sim_seed
