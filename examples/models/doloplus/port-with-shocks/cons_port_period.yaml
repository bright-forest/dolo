# Period type 3: cons-port_period (m → w)
#
# Stage sequence (within a period):
#   cons → port
#
# Intra-period wiring requires a rename:
# - cons outputs a
# - port expects k
# so we need an internal connector: k = a
#
# Terminal relabel:
# - port outputs m; we relabel it to w at period boundary so “period cntn” is w
#   (useful to distinguish from period-start m).
#
# Between-period link:
# - for an m-starting period, we typically want m_{t+1} = w_t.

name: cons_port_period

stages:
  - cons_stage
  - port_stage

# Proposed (optional) explicit connector declarations for period assembly.
# Current repo examples keep connections implicit; this block documents the intended wiring.
connectors:
  intra_period:
    - from: cons_stage
      to: port_stage
      rename: {a: k}
  terminal_relabel:
    rename: {m: w}

