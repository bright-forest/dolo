# Split-file Dolo+ example (spec_0.1c-style):
# - stage.yaml is a syntactic stage: no numeric calibration, no numeric settings.
# - numbers live in `calibration.yaml` and `settings.yaml`.
#
# This is intended to be *backwards-compatible in spirit* (same model), while
# moving the declaration surface toward decorator-based `symbols`.

name: consumption_savings_iid_egm_doloplus

symbols:
  # Spaces are optional in vanilla Dolo; included here to match Foundations.
  spaces:
    Xb: "@def R+"     # prestate assets domain
    Xw: "@def R+"     # decision wealth domain
    Xa: "@def R+"     # end-of-period assets domain
    Y:  "@def R"      # shock support (log income)

  # Dolo+ stage/perch groups (ADC dialect)
  prestate:
    b: "@in Xb"
  exogenous:
    # Foundations-style: the shock distribution is part of the syntactic declaration.
    # (Normal(μ_y, σ_y) is a DDSL primitive distribution object.)
    y:
      - "@in Y"
      - "@dist Normal(μ_y, σ_y)"
  states:
    w: "@in Xw"
  poststates:
    a: "@in Xa"
  controls:
    c: "@in R+"

  # Perch value objects (used with perch tags in equations)
  values:
    V: "@in R"
  values_marginal:
    dV: "@in R+"

  # Economic parameters
  parameters:
    β: "@in (0,1)"
    γ: "@in R+"
    ρ: "@in R"
    r: "@in R++"
    μ_y: "@in R"
    σ_y: "@in R+"

  # Numerical settings (new vs vanilla Dolo): feed method schemes (grid size/bounds, etc.)
  settings:
    n_w: "@in Z+"
    n_y_nodes: "@in Z+"
    n_sim: "@in Z+"
    sim_seed: "@in Z+"
    w_domain_min: "@in R+"
    w_domain_max: "@in R+"
    w_grid_min: "@in R+"
    w_grid_max: "@in R+"

equations:
  # v0.1 structural rule (stage-mode): under `equations:`, each entry is either
  # (i) a string payload (`| ...`) or (ii) a single-level mapping
  # `{subeq_label: | ...}`. Deeper nesting is disallowed in `dialect: adc-stage`.

  # Dolo (horse): `half_transition`
  arvl_to_dcsn_transition: |
    w = exp(y) + b*r
  # these are not new functions because this statement is true by equality; rather it defines implicitly a function 

  # Dolo (horse): `auxiliary_direct_egm`
  # Dolo+ note (keep this detail): in T core (formerly “DDSL-CORE”) this is “define g_ve as w,c \mapsto a, via the following”.
  # Interpreted by T core as:
  # - a = g_ve[x_dcsn] = w - c
  # - x_cntn = x_dcsn - c
  # AAS naming note: we usually use `g_ve` to refer to `a_fn`.
  dcsn_to_cntn_transition: |
    a = w - c

  # Dolo (horse): `reverse_state`
  # Akshay note: needs thought / confirm LHS perch (foundations uses `w` at decision perch).
  cntn_to_dcsn_transition: |
    w = a + c
  # above is not defining a transition euation so it needs to be defined as new function of the cntn
  # state


  # Dolo (horse): `direct_response_egm` (+ expectation integrand assembled elsewhere)
  # AAS naming note: we often write `V_dcsn_fn` for the function \(x_{dcsn} \mapsto V_{dcsn}(x_{dcsn})\),
  # and `c_cntn_fn` for the EGM representation of the policy on the continuation grid.
  cntn_to_dcsn_opr:
    # Dolo (horse): value recursion is typically implicit in dtcc/EGM YAML (kept explicit here for Dolo+).
    Bellman: |
      V = max_{c}((c^(1-γ))/(1-γ) + β*V[>])
    # - V_dcsn = V_fn_dcsn[x_dcsn] = max_{c}((c^(1-γ))/(1-γ) + β*V_fn_cntn[x_cntn])
    # AAS naming note: we usually use `V` (decision perch, unmarked) to refer to `V_dcsn_fn`.
    # V[>] = V_fn_cntn[x_cntn] = V_fn_cntn[a] = V_fn_cntn[g_ve(w,c)]
    # The V[>] is interpreted by syntax sugar as V_fn_cntn[x_cntn], which be definition of
    # the state variable is V_fn_cntn[a]. Then the transition function is implicitly defined
    # by the dcsn_to_cntn_transition *as something that takes to args (not necc the consumption function)
    # thus we have V_fn_cntn[a] = V_fn_cntn[g_ve(w,c)]. VERY STRICTL, A is also an argument in the 
    # above exposition since a is notsince a != w- c_fn_dcsn[w] in the V_fn_cntn[x_cntn] this is a
    # stlight abuse of mathematicl notation that needs to be resolved. 

    # Dolo (horse): `direct_response_egm` (policy update from expected marginal value)
    InvEuler: |
      c[>] = (β*dV[>])^(-1/γ)
    # Interpreted by T core as:
    # - c_fn_cntn[x_cntn] = (β*dV_fn_cntn[x_cntn])^(-1/γ)
    # AAS naming note: we usually use `c[>]` to refer to `c_cntn_fn`.

    # Dolo (horse): expectation integrand (RHS)
    MarginalBellman: |
      dV = (c)^(-γ)


  # Dolo (horse): `expectation` (produces the expected marginal object, often called `mr`)
  dcsn_to_arvl_opr:
    # Dolo (horse): value expectation is typically implicit in dtcc/EGM YAML (kept explicit here for Dolo+).
    Bellman: |
      V[<] = E_{y}(V)
    # Dolo (horse): expectation output (LHS)
    MarginalBellman: |
      dV[<] = r * E_{y}(dV)

dolo_plus:
  dialect: adc-stage
  version: 0.1
