# Split-file Dolo+ example (spec_0.1c-style):
# - stage.yaml is a syntactic stage: no numeric calibration, no numeric settings.
# - numbers live in `calibration.yaml` and `settings.yaml`.
#
# This is intended to be *backwards-compatible in spirit* (same model), while
# moving the declaration surface toward decorator-based `symbols`.

symbols:
  # Spaces are optional in vanilla Dolo; included here to match Foundations.
  spaces:
    Xb: "@def R+"     # prestate assets domain
    Xw: "@def R+"     # decision wealth domain
    Xa: "@def R+"     # end-of-period assets domain
    Y:  "@def R"      # shock support (log income)

  # Dolo+ stage/perch groups (ADC dialect)
  prestate:
    b: "@in Xb"
  exogenous:
    # Foundations-style: the shock distribution is part of the syntactic declaration.
    # (Normal(μ_y, σ_y) is a DDSL primitive distribution object.)
    y:
      - "@in Y"
      - "@dist Normal(μ_y, σ_y)"
  states:
    w: "@in Xw"
  poststates:
    a: "@in Xa"
  controls:
    c: "@in R+"

  # Perch value objects (used with perch tags in equations)
  values:
    V: "@in R"
  Marginal_value:
    dV: "@in R+"

  # Economic parameters
  parameters:
    β: "@in (0,1)"
    γ: "@in R+"
    ρ: "@in R"
    r: "@in R++"
    μ_y: "@in R"
    σ_y: "@in R+"

  # Numerical settings (new vs vanilla Dolo): feed method schemes (grid size/bounds, etc.)
  settings:
    n_w: "@in Z+"
    n_y_nodes: "@in Z+"
    n_sim: "@in Z+"
    sim_seed: "@in Z+"
    w_domain_min: "@in R+"
    w_domain_max: "@in R+"
    w_grid_min: "@in R+"
    w_grid_max: "@in R+"

equations:
  # v0.1 structural rule: each entry is either a string payload (`| ...`) or a single-level
  # mapping `{subeq_label: | ...}`; deeper nesting is disallowed in `dialect: adc-stage`.
  arvl_to_dcsn_transition: |  # Dolo: half_transition.
    w = exp(y) + b*r

  dcsn_to_cntn_transition: |  # Dolo: auxiliary_direct_egm --> in DDSL-CORE is "define g_ve as w,c \mapsto a, via the following"
    a = w - c               # interpreted by DDSL-CORE as a[_dcsn] = g_ve[x_dcsn] = w - c[_dcsn]; AAS: we usually use g_ve to refer to a_fn
                            # x_cntn = x_dcsn - c[_dcsn]
  cntn_to_dcsn_transition: |  # Dolo: reverse_state
    w[_cntn] = a + c[_cntn] # akshay needs to think about this. 


  cntn_to_dcsn_opr:         # Dolo: direct_response_egm (+ expectation integrand)
    Bellman: |                # Dolo: (implicit; value recursion not explicit in horse YAML)
      V[_dcsn] = max_{c}((c^(1-γ))/(1-γ) + β*V[_cntn]) # interpreted by DDSL-CORE as V_dcsn = V_fn_dcsn[x_dcsn] = max_{c}((c^(1-γ))/(1-γ) + β*V_fn_cntn[x_cntn]); AAS: we usually use V_fn_dcsn to refer to V_dcsn_fn
    InvEuler: |               # Dolo: direct_response_egm (policy update from expected marginal value)
      c[_cntn] = (β*dV[_cntn])^(-1/γ) # interpreted by DDSL-CORE as c_fn_cntn[x_cntn] = (β*dV_fn_cntn[x_cntn])^(-1/γ); AAS: we usually use c_fn_cntn to refer to c_cntn_fn
    MarginalBellman: |          # Dolo: expectation integrand (RHS)
      dV[_dcsn] = (c[_dcsn])^(-γ)

  dcsn_to_arvl_opr:         # Dolo: expectation (produces mr)
    Bellman: |                # Dolo: (implicit; value expectation not explicit in horse YAML)
      V[_arvl] = E_{y}(V[_dcsn])
    MarginalBellman: |          # Dolo: expectation output (LHS mr)
      dV[_arvl] = r * E_{y}(dV[_dcsn])

