# Methodization config (spec_0.1d)
#
# Attaches numerical-method metadata to stage targets:
# - Equation/mover labels
# - Sub-equation labels (dot notation)
# - Operator instance IDs (E_y, etc.)
#
# Exhaustive listing: all targets appear exactly once.
# Numeric values are settings symbol names → resolved via settings.yaml.

stage: consumption_savings_iid_egm_doloplus

methods:
  # =========================================================================
  # Operator instances (extracted from equation bodies)
  # =========================================================================

  # Expectation operator: E_{y}(...) in dcsn_to_arvl_mover
  - on: E_y
    schemes:
      - scheme: expectation
        method: !gauss-hermite
        settings:
          n_nodes: n_y_nodes

  # =========================================================================
  # Backward movers (value/policy iteration)
  # =========================================================================

  # cntn_to_dcsn_mover: EGM-style backward update
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !egm

      - scheme: interpolation
        method: !Cartesian
        settings:
          orders: [n_w]
          bounds: [[w_grid_min, w_grid_max]]
          domain: [w_domain_min, w_domain_max]

  # cntn_to_dcsn_mover sub-equations
  - on: cntn_to_dcsn_mover.Bellman
    schemes: []

  - on: cntn_to_dcsn_mover.InvEuler
    schemes: []

  - on: cntn_to_dcsn_mover.ShadowBellman
    schemes: []

  # dcsn_to_arvl_mover: expectation (backward)
  - on: dcsn_to_arvl_mover
    schemes: []

  - on: dcsn_to_arvl_mover.Bellman
    schemes: []

  - on: dcsn_to_arvl_mover.ShadowBellman
    schemes: []

  # =========================================================================
  # Transition kernels (no method attachment needed - pure functions)
  # =========================================================================

  - on: arvl_to_dcsn_transition
    schemes: []

  - on: dcsn_to_cntn_transition
    schemes: []

  - on: cntn_to_dcsn_transition
    schemes: []

  # =========================================================================
  # Forward movers (simulation / distribution evolution)
  # =========================================================================

  # Implied from arvl_to_dcsn_transition
  - on: arvl_to_dcsn_mover
    schemes:
      - scheme: simulation
        method: !monte-carlo
        settings:
          n_paths: n_sim
          seed: sim_seed

  # Implied from dcsn_to_cntn_transition
  - on: dcsn_to_cntn_mover
    schemes: []
