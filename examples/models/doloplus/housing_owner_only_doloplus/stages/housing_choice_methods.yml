# Methodization (spec_0.1d) for `stages/housing_choice.yaml`
#
# Key numerical ingredient in FUES `horses_h.py`:
# - Housing choice evaluates continuation objects (Q_cntn, V_cntn, λ_cntn)
#   at off-grid cash-on-hand values using *scalar interpolation on the w-grid*
#   (see `_interp_scalar_cpu` / `_interp_scalar_gpu` in FUES).
#
# This file records that as an `interpolation` scheme attached to the backward
# builder `cntn_to_dcsn_builder`.
#
# You asked specifically to have an interpolator for assets `a` too; we include
# both w- and a-grids as settings hooks (downstream can choose what it uses).
#
# NOTE: schemes/methods/settings are metadata; downstream solvers interpret them.

stage: OwnerHousingChoice

methods:
  - on: cntn_to_dcsn_builder
    schemes:
      # Discrete maximization over H_choice (enumeration over the discrete H grid)
      - scheme: maximization
        method: !grid-search

      # Interpolation hooks (linear, with grids referenced via symbols.settings)
      - scheme: interpolation
        method: !linear
        settings:
          # cash-on-hand grid (used in FUES housing choice interpolation)
          w_orders: [n_w]
          w_bounds: [[w_min, w_max]]
          w_domain: [w_min, w_max]

          # asset grid (optional hook; useful if you store V as function of assets)
          a_orders: [n_a]
          a_bounds: [[a_min, a_max]]
          a_domain: [a_min, a_max]

