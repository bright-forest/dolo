# Owner Housing Choice Stage (Dolo+ spec_0.1c)
# =============================================
# Discrete choice over housing stock with transaction costs.
# First stage in the period: income shock realized, housing adjusted.
#
# ADC Structure:
# - Arrival (_arvl): (a, H, y_pre) - assets, housing, previous income index
# - Decision (_dcsn): (a, H, y) - after shock, choose H_nxt
# - Continuation (_cntn): (w, H_nxt, y) - cash-on-hand after adjustment

name: OwnerHousingChoice

symbols:
  spaces:
    Xa: "@def R+"       # asset domain
    XH: "@def linspace(H_min, H_max, n_H)"  # discrete housing grid
    Xw: "@def R+"       # cash-on-hand domain
    Y:  "@def Z+"       # income shock index

  prestate:
    b: "@in Xa"         # beginning-of-period assets
    H: "@in XH"         # current housing stock
    y_pre: "@in Y"      # previous income shock index

  exogenous:
    y:
      - "@in Y"
      - "@dist DiscreteMarkov(Pi, z_vals)"

  states:
    # After shock revealed, before housing choice
    w: "@in Xa"
    H: "@in XH"
    y: "@in Y"

  poststates:
    w: "@in Xw"         # cash-on-hand after housing adjustment
    H_nxt: "@in XH"     # chosen housing stock (discrete)
    y: "@in Y"          # realized income shock index (carried forward)

  controls:
    H_choice: "@in XH"  # housing stock choice (discrete)

  values:
    V: "@in R"
  shadow_value:
    dV: "@in R+"

  parameters:
    r: "@in R+"         # interest rate
    phi: "@in R+"       # housing transaction cost (proportional)
    n_H: "@in Z+"       # housing grid points (defines XH)
    H_min: "@in R+"     # housing grid lower bound (defines XH)
    H_max: "@in R+"     # housing grid upper bound (defines XH)

  settings:
    n_a: "@in Z+"
    n_w: "@in Z+"
    n_y: "@in Z+"
    a_min: "@in R+"
    a_max: "@in R+"
    w_min: "@in R+"
    w_max: "@in R+"

equations:
  # Arrival to Decision: income shock realized, identity on (a, H)
  arvl_to_dcsn_transition: |
    # Shock is realized between arvl and dcsn, so fold it into the dcsn resources.
    # This mirrors the FUES implementation where the housing-choice stage's decision
    # problem is conditioned on current income.
    w[_dcsn] = (1 + r)*b[_arvl] + z_vals[y]

  # Decision to Continuation: housing choice with transaction costs
  # w = (1+r)*a + z(y) + H - (1+phi*I_{H_nxt!=H})*H_nxt
  dcsn_to_cntn_transition: |
    # Here a_dcsn already includes (1+r)*a + z(y).
    w[_cntn] = a_dcsn[_dcsn] + H_dcsn[_dcsn] - (1 + phi*(H_choice[_dcsn] != H_dcsn[_dcsn]))*H_choice[_dcsn]
    H_nxt[_cntn] = H_choice[_dcsn]
    y[_cntn] = y[_dcsn]

  # Backward mover: discrete choice over housing
  cntn_to_dcsn_mover:
    Bellman: |
      V[_dcsn] = max_{H_choice}(V[_cntn])
    ShadowBellman: |
      dV[_dcsn] = dV[_cntn]

  # Expectation over income shocks
  dcsn_to_arvl_mover:
    Bellman: |
      V[_arvl] = E_{y|y_pre}(V[_dcsn])
    ShadowBellman: |
      dV[_arvl] = E_{y|y_pre}(dV[_dcsn])
