# Owner Consumption Choice Stage (Dolo+ spec_0.1c)
# ================================================
# Continuous consumption choice solved via EGM (with FUES-style upper envelope).
# Second stage in the period: given cash-on-hand and chosen housing, choose consumption.
#
# ADC Structure:
# - Arrival (_arvl): (w, H_nxt, y)     cash-on-hand, chosen housing, income state
# - Decision (_dcsn): (w, H_nxt, y)    same information set; choose c
# - Continuation (_cntn): (a_nxt, H_nxt, y) end-of-period assets + carried states

name: OwnerConsumptionChoice

symbols:
  spaces:
    Xa: "@def R+"       # asset domain
    XH: "@def linspace(H_min, H_max, n_H)"       # housing stock domain
    Xw: "@def R+"       # cash-on-hand domain
    Y:  "@def Z+"       # income shock index

  prestate:
    w: "@in Xw"         # cash-on-hand (from housing stage)
    H_nxt: "@in XH"     # housing stock (already chosen)
    y: "@in Y"          # current income shock index

  exogenous: {}  # No shock in this stage; income already realized in housing stage.

  states:
    w: "@in Xw"         # cash-on-hand (from housing stage)
    H_nxt: "@in XH"     # housing stock (already chosen)
    y: "@in Y"          # current income shock index

  poststates:
    a_nxt: "@in Xa"     # end-of-period assets
    H_nxt: "@in XH"     # housing stock (already chosen)
    y: "@in Y"          # current income shock index

  controls:
    c: "@in R+"         # consumption

  values:
    V: "@in R"
  shadow_value:
    dV: "@in R+"

  parameters:
    beta: "@in (0,1)"   # discount factor
    gamma: "@in R+"     # CRRA coefficient
    theta: "@in (0,1)"  # consumption weight (alpha in utility)
    kappa: "@in R+"     # housing service scaling
    iota: "@in R+"      # housing service constant
    n_H: "@in Z+"       # housing grid points (defines XH)
    H_min: "@in R+"     # housing grid lower bound (defines XH)
    H_max: "@in R+"     # housing grid upper bound (defines XH)

  settings:
    n_a: "@in Z+"
    n_w: "@in Z+"
    n_y: "@in Z+"
    a_min: "@in R+"
    a_max: "@in R+"
    w_min: "@in R+"
    w_max: "@in R+"
    ue_kwargs: "@in R"  # upper-envelope kwargs (method-specific dict; see settings.yaml)

equations:
  # Arrival to Decision: identity (no shock in this stage)
  arvl_to_dcsn_transition: |

  # Decision to Continuation: savings equation
  dcsn_to_cntn_transition: |
    a_nxt = w -c 

  # Reverse mapping for EGM
  cntn_to_dcsn_transition: |
    w_dcsn[>] = a_nxt + c_fn[>]

  # Backward mover: Bellman + EGM
  cntn_to_dcsn_mover:
    # Utility: Cobb-Douglas in consumption and housing services
    # u(c, H) = ((c^theta * (kappa*H + iota)^(1-theta))^(1-gamma))/(1-gamma)
    Bellman: |
      V = max_{c}(((c^theta * (kappa*H_nxt + iota)^(1-theta))^(1-gamma))/(1-gamma) + beta*V[>])
    InvEuler: |
      c_fn[>] = (beta*dV[>] / (theta * (kappa*H_nxt + iota)^((1-theta)*(1-gamma))))^(-1/(theta*(1-gamma) + gamma - 1))
    ShadowBellman: |
      dV[>] = theta * c_fn[>]^(theta*(1-gamma)-1) * (kappa*H_nxt + iota)^((1-theta)*(1-gamma))

      # from the above, the implicit EGM algo is to build..

  # Decision to Arrival: identity (no shock integration needed within stage)
  dcsn_to_arvl_mover:
    Bellman: |
      V[<] = V
    ShadowBellman: |
      dV[<] = dV

