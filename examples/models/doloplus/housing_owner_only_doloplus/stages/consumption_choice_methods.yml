# Methodization (spec_0.1d) for `stages/consumption_choice.yaml`
#
# Goal: mirror the two key "method knobs" in FUES `horses_c.py`:
#   - model.methods["solution"]        ∈ {EGM, VFI, VFI_HDGRID, ...}
#   - model.methods["upper_envelope"]  ∈ {FUES, CONSAV, ...}
#
# The *tricky bit* (method-specific settings):
# - Different upper-envelope methods take different kwargs.
# - We model this by storing a dict-of-dicts in settings.yaml:
#     settings.ue_kwargs = { common: {...}, FUES: {...}, CONSAV: {...}, ... }
#   and passing the *symbol name* `ue_kwargs` here.
# - A solver can then do: kwargs = {**ue_kwargs["common"], **ue_kwargs[method]}
#
# Note: schemes + settings are metadata only; downstream solvers interpret them.

stage: OwnerConsumptionChoice

methods:
  - on: cntn_to_dcsn_mover
    schemes:
      # Backward solution algorithm (FUES: model.methods["solution"])
      - scheme: bellman_backward
        method: !egm

      # Upper envelope / refinement engine (FUES: model.methods["upper_envelope"])
      - scheme: upper_envelope
        method: !FUES
        settings:
          kwargs_by_method: ue_kwargs

      # Interpolation / approximation over the continuous resource state (w)
      - scheme: interpolation
        method: !Cartesian
        settings:
          orders: [n_w]
          bounds: [[w_min, w_max]]
          domain: [w_min, w_max]

