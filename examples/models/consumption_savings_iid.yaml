symbols:
    # DDSL-style: collections of Backus declarations with human-readable labels.
    # The quoted YAML keys are *names/labels*; the unquoted tokens (β, w, c, ...) are the symbols
    # that appear in equations. (WIP: “below the line” symbol coverage comes later.)

    spaces:
        "arvl_state_space": Xa @def R+
        "dcsn_state_space": Xv @def R+
        "cntn_state_space": Xe @def R+
        "shock_support_space": Y @def R
        "action_space": A @def R+

    variables:
        states:
            "arvl_state": w_pre @in Xa
            "dcsn_state": w @in Xv
            "cntn_state": a @in Xe

        controls:
            "consumption": c @in A

        shocks:
            "income shock": y @in Y

    parameters:
        "disc_fac": β @in (0,1)
        "risk_fac": γ @in R+
        "shock_var": σ @in R+
        "shock_mean": μ_w @in R
        "return_fac": r @in R+
        "consumption normalizer": cbar @in R+

    constraints:
        "feas_cons_set": |
            Gamma: Xv ->> A


equations:

    transition:
        - w[t] = exp(y[t]) + (w[t-1]-c[t-1])*r

    arbitrage:
        - β*( c[t+1]/c[t] )^(-γ)*r - 1  | 0.0<=c[t]<=w[t]

    half_transition: |
        w[t] = exp(y[t]) + a[t-1]*r

    reverse_state: |
        w[t] = a[t] + c[t]

    expectation: |
        mr[t] = β*( c[t+1]/cbar )^(-γ)*r

    direct_response_egm: |
        c[t] = cbar*(mr[t])^(-1/γ)

calibration:
    β: 0.96
    γ: 4.0
    σ: 0.1
    ρ: 0.0
    r: 1.02
    cbar: c

    w: 1.0
    ξ: 0.0
    c: 0.9*w

domain:
    w: [0.01, 4.0]

exogenous: !UNormal
    sigma: σ


options:
    grid: !Cartesian
        orders: [100]
