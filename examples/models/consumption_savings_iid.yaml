symbols:
    # DDSL-style: collections of Backus declarations with human-readable labels.
    # The quoted YAML keys are *names/labels*; the unquoted tokens (β, w, c, ...) are the symbols
    # that appear in equations. (WIP: “below the line” symbol coverage comes later.)
    # 

symbols:
    exogenous: [y1,y2,y3] 
    states: [m] @inR+
    expectations: [mr]
    poststates: [a]
    prestates: [k]
    controls: [c]
    parameters: [β, γ, σ, ρ, r, cbar]

math:
    variables:
        "arvl_state": [k @in R] #Xa becomes [R] over here, and xa becomes [k]. This is baked in DDSL. 
        "dcsn_state": [m @in R] #Xv becomes [R] over here. This is baked in DDSL. 
        "cntn_state": [a @in R+] #Xe becomes [R] over here. This is baked in DDSL. 
        "shck": [y1,y2,y3 @in SHK] #W becomes SH\colon = @IntervalCl....
        "actn": [c @in R+] #A becomes R+ over here
    
    constraints:
        "feas_cnst": IntervalOpCl(0, m + PDV_NBC) #RHS must be a set with m 

    parameters:
        "disc_fac": β @in (0,1)
        "risk_fac": γ @in R+
        "shock_var": σ @in R+
        "shock_mean": μ_w @in R
        "return_fac": r @in R+
        "consumption normalizer": cbar @in R+
    spaces:
        "income_space_blah": SHK @def [{0,1}, @IntervalClCl(\theta_min, \theta_max), @IntervalClCl(\psi_min, \psi_max)] # W in the math



equations:

    transition:
        - w[t] = exp(y[t]) + (w[t-1]-c[t-1])*r

    arbitrage:
        - β*( c[t+1]/c[t] )^(-γ)*r - 1  | 0.0<=c[t]<=w[t]

    half_transition: |
        w[t] = exp(y[t]) + a[t-1]*r

    reverse_state: |
        w[t] = a[t] + c[t]

    expectation: |
        mr[t] = β*( c[t+1]/cbar )^(-γ)*r

    direct_response_egm: |
        c[t] = cbar*(mr[t])^(-1/γ)

calibration:
    β: 0.96
    γ: 4.0
    σ: 0.1
    ρ: 0.0
    r: 1.02
    cbar: c

    w: 1.0
    ξ: 0.0
    c: 0.9*w

domain:
    w: [0.01, 4.0]

exogenous: !UNormal
    sigma: σ


options:
    grid: !Cartesian
        orders: [100]
